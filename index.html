<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>モジノート</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { terracotta: '#E07A5F', sage: '#81B29A', bluegrey: '#3D405B', cream: '#F4F1DE', mustard: '#F2CC8F' },
          fontFamily: {
            rounded: ['"M PLUS Rounded 1c"', 'sans-serif'],
            kyokasho: ['"UD Digi Kyokasho N-B"', '"UD デジタル 教科書体 N-B"', '"Klee One"', 'serif'],
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    body { margin: 0; overflow: hidden; touch-action: manipulation; user-select: none; height: 100dvh; width: 100vw; }
    #root { height: 100%; width: 100%; }
    .bg-cork { background-color: #d0a57b; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E"); }
    .bg-paper { background-color: #F4F1DE; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E"); }
    .masking-tape { position: absolute; top: -12px; left: 50%; transform: translateX(-50%) rotate(-2deg); width: 80px; height: 28px; background-color: rgba(129, 178, 154, 0.6); box-shadow: 0 1px 2px rgba(0,0,0,0.1); z-index: 10; border-left: 2px dotted rgba(255,255,255,0.6); border-right: 2px dotted rgba(255,255,255,0.6); }
    .masking-tape-terracotta { background-color: rgba(224, 122, 95, 0.6); transform: translateX(-50%) rotate(3deg); }
    .masking-tape-mustard { background-color: rgba(242, 204, 143, 0.6); transform: translateX(-50%) rotate(-1deg); }
    .pin { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, #fca5a5, #E07A5F); box-shadow: 2px 3px 4px rgba(0,0,0,0.3), inset -1px -1px 3px rgba(0,0,0,0.2); z-index: 10; }
    .pin::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 4px; height: 4px; border-radius: 50%; background-color: rgba(255,255,255,0.6); }
    .pin-blue { background: radial-gradient(circle at 30% 30%, #93c5fd, #3D405B); }
    .pin-yellow { background: radial-gradient(circle at 30% 30%, #fde047, #F2CC8F); }
    @keyframes openNote { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
    .animate-open-note { animation: openNote 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
    @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    canvas { touch-action: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const HIRAGANA_SEION = ['あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん'];
    const HIRAGANA_DAKUON = ['が','ぎ','ぐ','げ','ご','ざ','じ','ず','ぜ','ぞ','だ','ぢ','づ','で','ど','ば','び','ぶ','べ','ぼ','ぱ','ぴ','ぷ','ぺ','ぽ'];
    
    const KATAKANA_SEION = ['ア','イ','ウ','エ','オ','カ','キ','ク','ケ','コ','サ','シ','ス','セ','ソ','タ','チ','ツ','テ','ト','ナ','ニ','ヌ','ネ','ノ','ハ','ヒ','フ','ヘ','ホ','マ','ミ','ム','メ','モ','ヤ','ユ','ヨ','ラ','リ','ル','レ','ロ','ワ','ヲ','ン'];
    const KATAKANA_DAKUON = ['ガ','ギ','グ','ゲ','ゴ','ザ','ジ','ズ','ゼ','ゾ','ダ','ヂ','ヅ','デ','ド','バ','ビ','ブ','ベ','ボ','パ','ピ','プ','ペ','ポ'];

    const HIRAGANA_STROKES = {
      'あ':3,'い':2,'う':2,'え':2,'お':3,'か':3,'き':4,'く':1,'け':3,'こ':2,
      'さ':3,'し':1,'す':2,'せ':3,'そ':1,'た':4,'ち':2,'つ':1,'て':1,'と':2,
      'な':4,'に':3,'ぬ':2,'ね':2,'の':1,'は':3,'ひ':1,'ふ':4,'へ':1,'ほ':4,
      'ま':3,'み':2,'む':3,'め':2,'も':3,'や':3,'ゆ':2,'よ':2,'ら':2,'り':2,
      'る':1,'れ':2,'ろ':1,'わ':2,'を':3,'ん':1,
      'が':5,'ぎ':6,'ぐ':3,'げ':5,'ご':4,'ざ':5,'じ':3,'ず':4,'ぜ':5,'ぞ':3,
      'だ':6,'ぢ':4,'づ':3,'で':3,'ど':4,'ば':5,'び':3,'ぶ':6,'べ':3,'ぼ':6,
      'ぱ':4,'ぴ':2,'ぷ':5,'ぺ':2,'ぽ':5,
      'ぁ':3,'ぃ':2,'ぅ':2,'ぇ':2,'ぉ':3,'っ':1,'ゃ':3,'ゅ':2,'ょ':2,'ゎ':2
    };

    const KATAKANA_STROKES = {
      'ア':2,'イ':2,'ウ':3,'エ':3,'オ':3,'カ':2,'キ':3,'ク':2,'ケ':3,'コ':2,
      'サ':3,'シ':3,'ス':2,'セ':2,'ソ':2,'タ':3,'チ':3,'ツ':3,'テ':3,'ト':2,
      'ナ':2,'ニ':2,'ヌ':2,'ネ':4,'ノ':1,'ハ':2,'ヒ':2,'フ':1,'ヘ':1,'ホ':4,
      'マ':2,'ミ':3,'ム':2,'メ':2,'モ':3,'ヤ':2,'ユ':2,'ヨ':3,'ラ':2,'リ':2,
      'ル':2,'レ':1,'ロ':3,'ワ':2,'ヲ':3,'ン':2,
      'ガ':4,'ギ':5,'グ':4,'ゲ':5,'ゴ':4,'ザ':5,'ジ':5,'ズ':4,'ゼ':4,'ゾ':4,
      'ダ':5,'ヂ':5,'ヅ':5,'デ':5,'ド':4,'バ':4,'ビ':4,'ブ':3,'ベ':3,'ボ':6,
      'パ':3,'ピ':3,'プ':2,'ペ':2,'ポ':5,
      'ァ':2,'ィ':2,'ゥ':3,'ェ':3,'ォ':3,'ッ':3,'ャ':2,'ュ':2,'ョ':3,'ヮ':2,'ー':1,
    };

    const HIRAGANA_WORDS = [
      'あさ', 'いぬ', 'うみ', 'えき', 'おと', 'かさ', 'きく', 'くつ', 'こま', 'さる', 'しお', 'すいか', 'そら', 'たこ', 'つくえ', 'とけい', 'なつ', 'にわ', 'ぬの', 'ねこ', 'のり', 'はな', 'ひも', 'ふね', 'へや', 'ほし', 'まち', 'みかん', 'むし', 'もも', 'やま', 'ゆき', 'よる', 'りす', 'るす', 'わに', 'わかめ', 'いんこ', 'えいが', 'おちゃ', 'おかし', 'かえる', 'かもめ', 'あずき', 'あひる', 'あわび', 'いえ', 'いわし', 'うさぎ', 'うきわ',
      'めがね', 'かぎ', 'かぐ', 'ひげ', 'りんご', 'かぜ', 'くじら', 'みず', 'かぞく', 'かたな', 'かばん', 'きっぷ', 'くるま', 'さとう', 'こくご', 'すいか', 'たいこ', 'つみき', 'とうふ', 'はなび', 'ひよこ', 'ほのお', 'まくら', 'めいし', 'もくば', 'ゆのみ', 'りんご', 'れんが', 
      'めだか', 'はなぢ', 'つづく', 'でんわ', 'まど', 'かばん', 'へび', 'ぶた', 'なべ', 'ぼうし',
      'さんぽ', 'きっぷ'
    ].filter(w => w.length <= 3);

    const KATAKANA_WORDS = [
      'アイス', 'スイカ', 'テント', 'ナイフ', 'マスク', 'ミカン', 'メロン', 'トイレ', 'マイク', 'クラス', 'テニス', 'タオル', 'クイズ', 'ミルク', 'カメラ', 'カラス', 'クルミ', 'トマト', 'ハワイ', 'ホテル', 'バッグ', 'アニメ', 'ココア', 'チョコ', 'サラダ', 'ウサギ', 'カレー', 'クイズ', 'コアラ', 'サンタ', 'ソーダ', 'チキン', 'ツナ', 'テニス', 'トイレ', 'ホタテ', 'マイク', 'ヨット', 'ランプ', 'リボン', 'ルビー', 'レモン', 'ワイン',
      'ガラス', 'ギター', 'グラス', 'ゲーム', 'ゴリラ', 'ラジオ', 'ズボン', 'ゼリー', 'ゾウ',
      'ドア', 'ビル', 'ボタン', 'ピアノ', 'パンダ', 'プール', 'コップ', 'ベッド'
    ].filter(w => w.length <= 3);

    const DAKUON_REGEX = /[が-ぼぱ-ぽガ-ボパ-ポ]/;

    const App = () => {
      const [isFontLoaded, setIsFontLoaded] = useState(false);
      useEffect(() => {
        document.fonts.load('10px "Klee One"').then(() => setIsFontLoaded(true));
      }, []);

      const [gameState, setGameState] = useState('TITLE'); 
      const [charType, setCharType] = useState('hiragana');
      const [playMode, setPlayMode] = useState('char');
      
      const [questions, setQuestions] = useState([]);
      const [currentIndex, setCurrentIndex] = useState(0);
      const [currentStep, setCurrentStep] = useState('trace'); 

      const [score, setScore] = useState(0);
      const [feedback, setFeedback] = useState(null);
      const [errorMessage, setErrorMessage] = useState('');
      const [hasMistaked, setHasMistaked] = useState(false);
      
      const [penSize, setPenSize] = useState(25);
      const [difficulty, setDifficulty] = useState(0.60);
      const [useDakuon, setUseDakuon] = useState(false);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      
      const bgCanvasRefs = useRef([]);
      const drawCanvasRefs = useRef([]);
      const pathsRef = useRef([]);
      const currentPathRef = useRef([]);
      
      const isDrawingRef = useRef(false);
      const activeCanvasIndexRef = useRef(null);

      const CANVAS_SIZE = 400;

      const targetChars = questions.length > 0 
        ? (playMode === 'char' ? [questions[currentIndex]] : questions[currentIndex].split(''))
        : [];

      const addScoreToLocal = () => {
        const currentScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
        localStorage.setItem('gogo_drill_score', currentScore + 1);
      };

      const startGame = (mode) => {
        setPlayMode(mode);
        let qList = [];
        
        if (mode === 'char') {
          let chars = charType === 'hiragana' ? [...HIRAGANA_SEION] : [...KATAKANA_SEION];
          if (useDakuon) {
            chars = chars.concat(charType === 'hiragana' ? HIRAGANA_DAKUON : KATAKANA_DAKUON);
          }
          qList = chars.sort(() => 0.5 - Math.random()).slice(0, 10);
        } else {
          let words = charType === 'hiragana' ? HIRAGANA_WORDS : KATAKANA_WORDS;
          if (!useDakuon) {
            words = words.filter(word => !DAKUON_REGEX.test(word));
          }
          qList = words.sort(() => 0.5 - Math.random()).slice(0, 5);
        }
        
        setQuestions(qList);
        setCurrentIndex(0);
        setCurrentStep('trace');
        setScore(0);
        setHasMistaked(false);
        setGameState('PRACTICE');
        setFeedback(null);
        setErrorMessage('');
      };

      const goToNext = () => {
        setFeedback(null);
        setErrorMessage('');
        
        if (currentStep === 'trace') {
          setCurrentStep('blind');
          setHasMistaked(false);
        } else if (currentStep === 'retry_trace') {
          setCurrentStep('blind');
        } else {
          setCurrentStep('trace');
          setHasMistaked(false);
          if (currentIndex + 1 < questions.length) {
            setCurrentIndex(i => i + 1);
          } else {
            setGameState('RESULT');
          }
        }
      };

      const skipQuestion = () => {
        setFeedback(null);
        setErrorMessage('');
        pathsRef.current = [];
        currentPathRef.current = [];
        setCurrentStep('trace');
        setHasMistaked(false);
        if (currentIndex + 1 < questions.length) {
          setCurrentIndex(i => i + 1);
        } else {
          setGameState('RESULT');
        }
      };

      useEffect(() => {
        if (gameState === 'PRACTICE' && targetChars.length > 0) {
          clearCanvas();
        }
      }, [gameState, currentIndex, currentStep, questions]);

      const clearCanvas = () => {
        pathsRef.current = Array.from({ length: targetChars.length }, () => []);
        currentPathRef.current = [];
        isDrawingRef.current = false;
        activeCanvasIndexRef.current = null;
        
        targetChars.forEach((char, idx) => {
          const drawCanvas = drawCanvasRefs.current[idx];
          if (drawCanvas) {
            const drawCtx = drawCanvas.getContext('2d');
            drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
          }
          
          const bgCanvas = bgCanvasRefs.current[idx];
          if (bgCanvas) {
            const bgCtx = bgCanvas.getContext('2d', { willReadFrequently: true });
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.fillStyle = '#ffffff';
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            bgCtx.save();
            bgCtx.strokeStyle = '#81B29A';
            bgCtx.globalAlpha = 0.5;
            bgCtx.lineWidth = 2;
            bgCtx.setLineDash([8, 8]);
            bgCtx.beginPath();
            bgCtx.moveTo(bgCanvas.width / 2, 0);
            bgCtx.lineTo(bgCanvas.width / 2, bgCanvas.height);
            bgCtx.moveTo(0, bgCanvas.height / 2);
            bgCtx.lineTo(bgCanvas.width, bgCanvas.height / 2);
            bgCtx.stroke();
            bgCtx.restore();

            if (char) {
              bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
              bgCtx.textAlign = 'center';
              bgCtx.textBaseline = 'middle';
              
              if (currentStep === 'trace') {
                bgCtx.fillStyle = 'rgba(61, 64, 91, 0.15)'; 
                bgCtx.fillText(char, bgCanvas.width / 2, bgCanvas.height / 2);
              } else if (currentStep === 'retry_trace') {
                bgCtx.fillStyle = 'rgba(224, 122, 95, 0.25)'; 
                bgCtx.fillText(char, bgCanvas.width / 2, bgCanvas.height / 2);
              }
            }
          }
        });
      };

      const getCoordinates = (e, index) => {
        const canvas = drawCanvasRefs.current[index];
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
          x: (clientX - rect.left) * scaleX,
          y: (clientY - rect.top) * scaleY
        };
      };

      const startDrawing = (e, index) => {
        if (feedback !== null) return;
        isDrawingRef.current = true;
        activeCanvasIndexRef.current = index;
        const { x, y } = getCoordinates(e, index);
        currentPathRef.current = [{ x, y }];
        
        const ctx = drawCanvasRefs.current[index].getContext('2d');
        ctx.beginPath();
        ctx.moveTo(x, y);
        ctx.lineTo(x, y + 0.1); 
        ctx.lineWidth = penSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#3D405B';
        ctx.stroke();
      };

      const draw = (e, index) => {
        if (!isDrawingRef.current || feedback !== null || activeCanvasIndexRef.current !== index) return;
        const { x, y } = getCoordinates(e, index);
        currentPathRef.current.push({ x, y });
        
        const ctx = drawCanvasRefs.current[index].getContext('2d');
        ctx.lineTo(x, y);
        ctx.lineWidth = penSize;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#3D405B';
        ctx.stroke();
      };

      const stopDrawing = (e, index) => {
        if (!isDrawingRef.current || activeCanvasIndexRef.current !== index) return;
        isDrawingRef.current = false;
        activeCanvasIndexRef.current = null;
        if (currentPathRef.current.length > 0) {
          pathsRef.current[index].push([...currentPathRef.current]);
          currentPathRef.current = [];
        }
      };

      const checkWriting = () => {
        let allCorrect = true;
        let hasNoInput = false;
        let firstErrorMsg = '';

        targetChars.forEach((char, idx) => {
          const paths = pathsRef.current[idx];
          const targetStrokeCount = charType === 'hiragana' ? HIRAGANA_STROKES[char] : KATAKANA_STROKES[char];
          
          let totalPoints = 0;
          let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
          const halfPen = penSize / 2;

          if (paths) {
            paths.forEach(path => {
              path.forEach(pt => {
                if (pt.x - halfPen < minX) minX = pt.x - halfPen;
                if (pt.x + halfPen > maxX) maxX = pt.x + halfPen;
                if (pt.y - halfPen < minY) minY = pt.y - halfPen;
                if (pt.y + halfPen > maxY) maxY = pt.y + halfPen;
                totalPoints++;
              });
            });
          }

          if (totalPoints < 2) {
            allCorrect = false;
            hasNoInput = true;
            return;
          }

          const width = CANVAS_SIZE;
          const height = CANVAS_SIZE;
          const normalizedPaths = paths;

          const targetCanvas = document.createElement('canvas');
          targetCanvas.width = width;
          targetCanvas.height = height;
          const targetCtx = targetCanvas.getContext('2d', { willReadFrequently: true });
          targetCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
          targetCtx.textAlign = 'center';
          targetCtx.textBaseline = 'middle';
          targetCtx.fillStyle = '#FF0000';
          targetCtx.fillText(char, width / 2, height / 2);
          const targetData = targetCtx.getImageData(0, 0, width, height).data;

          const targetCanvasFat = document.createElement('canvas');
          targetCanvasFat.width = width;
          targetCanvasFat.height = height;
          const targetCtxFat = targetCanvasFat.getContext('2d', { willReadFrequently: true });
          targetCtxFat.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
          targetCtxFat.textAlign = 'center';
          targetCtxFat.textBaseline = 'middle';
          targetCtxFat.fillStyle = '#FF0000';
          targetCtxFat.fillText(char, width / 2, height / 2);
          targetCtxFat.lineWidth = penSize * 2.5;
          targetCtxFat.lineJoin = 'round';
          targetCtxFat.strokeStyle = '#FF0000';
          targetCtxFat.strokeText(char, width / 2, height / 2);
          const targetDataFat = targetCtxFat.getImageData(0, 0, width, height).data;

          const userCanvas = document.createElement('canvas');
          userCanvas.width = width;
          userCanvas.height = height;
          const userCtx = userCanvas.getContext('2d', { willReadFrequently: true });
          userCtx.lineWidth = penSize;
          userCtx.lineCap = 'round';
          userCtx.lineJoin = 'round';
          userCtx.strokeStyle = '#000000';

          normalizedPaths.forEach(path => {
            if (path.length === 0) return;
            userCtx.beginPath();
            userCtx.moveTo(path[0].x, path[0].y);
            if (path.length === 1) {
              userCtx.lineTo(path[0].x, path[0].y + 0.1);
            } else {
              for (let i = 1; i < path.length; i++) {
                userCtx.lineTo(path[i].x, path[i].y);
              }
            }
            userCtx.stroke();
          });

          const userData = userCtx.getImageData(0, 0, width, height).data;

          let targetPixelCount = 0;
          let userPixelCount = 0;
          let coveredPixelCount = 0;
          let userInsideFatCount = 0;
          const step = 4;

          for (let y = 0; y < height; y += step) {
            for (let x = 0; x < width; x += step) {
              const i = (y * width + x) * 4;
              const isTargetCore = targetData[i + 3] > 50;
              const isTargetFat = targetDataFat[i + 3] > 50;
              const isUser = userData[i + 3] > 50;

              if (isTargetCore) targetPixelCount++;
              if (isUser) {
                userPixelCount++;
                if (isTargetCore) coveredPixelCount++;
                if (isTargetFat) userInsideFatCount++;
              }
            }
          }

          const coverRate = targetPixelCount === 0 ? 0 : coveredPixelCount / targetPixelCount;
          const insideRate = userPixelCount === 0 ? 0 : userInsideFatCount / userPixelCount;
          const isNotCheating = userPixelCount < targetPixelCount * 3.5; 
          
          const userStrokeCount = paths.length;
          const isStrokeCorrect = userStrokeCount === targetStrokeCount;

          let finalDifficulty = difficulty || 0.60;
          if (targetStrokeCount <= 2) {
            finalDifficulty -= 0.15; 
          } else if (targetStrokeCount <= 4) {
            finalDifficulty -= 0.10; 
          }
          finalDifficulty = Math.max(0.30, finalDifficulty);

          const isCorrect = isStrokeCorrect && (coverRate >= finalDifficulty) && (insideRate >= 0.70) && isNotCheating;
          
          if (!isCorrect) {
            allCorrect = false;
            if (!firstErrorMsg) {
              const displayIdx = targetChars.length > 1 ? `${idx + 1}もじめの ` : '';
              if (!isStrokeCorrect) {
                firstErrorMsg = `${displayIdx}かくすう が ちがうよ！\n(せいかいは ${targetStrokeCount} かく)`;
              } else {
                firstErrorMsg = `${displayIdx}かたちが すこし ちがうみたい`;
              }
            }
          }
        });

        if (hasNoInput) {
          setFeedback('❌');
          setErrorMessage('かいていない マスが あるよ！');
          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
          }, 2500);
          return;
        }

        if (allCorrect) {
          setFeedback('⭕️');
          if (currentStep !== 'retry_trace' && !hasMistaked) {
            setScore(s => s + 1);
            addScoreToLocal(); 
          }
          setTimeout(() => {
            goToNext();
          }, 1500);
        } else {
          setFeedback('❌');
          setErrorMessage(firstErrorMsg);
          setHasMistaked(true);
          
          if (currentStep === 'blind') {
            targetChars.forEach((char, idx) => {
              const bgCanvas = bgCanvasRefs.current[idx];
              if (bgCanvas) {
                const bgCtx = bgCanvas.getContext('2d');
                bgCtx.font = `340px "UD Digi Kyokasho N-B", "UD デジタル 教科書体 N-B", "Klee One", serif`;
                bgCtx.textAlign = 'center';
                bgCtx.textBaseline = 'middle';
                bgCtx.fillStyle = 'rgba(224, 122, 95, 0.4)';
                bgCtx.fillText(char, bgCanvas.width / 2, bgCanvas.height / 2);
              }
            });
          }

          setTimeout(() => {
            setFeedback(null);
            setErrorMessage('');
            if (currentStep === 'blind') {
              setCurrentStep('retry_trace');
            } else {
              clearCanvas();
            }
          }, 2500);
        }
      };

      const maxScore = questions.length * 2; 

      return (
        <div className="w-full h-full flex flex-col items-center justify-center relative overflow-hidden bg-cork">
          
          {(gameState === 'TITLE' || gameState === 'MODE_SELECT') && (
            <>
              <button onClick={() => window.location.href = 'https://hot-spring-egg.github.io/ontama-drill/'} className="absolute top-4 left-4 sm:top-6 sm:left-6 bg-white/90 text-bluegrey px-4 py-2 rounded-full font-bold shadow-sm hover:shadow-md transition-all z-40 border border-gray-200 text-sm sm:text-base">
                ← ドリルにもどる
              </button>
              <button onClick={() => setIsSettingsOpen(true)} className="absolute top-4 right-4 sm:top-6 sm:right-6 bg-white/80 text-bluegrey w-12 h-12 sm:w-14 sm:h-14 rounded-full flex items-center justify-center text-2xl sm:text-3xl shadow-sm hover:shadow-md transition-all z-40 border border-gray-200">
                ⚙️
              </button>
            </>
          )}

          {isSettingsOpen && (
            <div className="absolute inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-paper p-6 sm:p-8 rounded-2xl shadow-2xl w-full max-w-md relative animate-pop-in border border-white max-h-[90vh] overflow-y-auto">
                <h2 className="font-rounded text-2xl sm:text-3xl font-bold mb-6 text-center text-bluegrey border-b-2 border-sage pb-2">せってい</h2>
                <div className="mb-8"><p className="font-rounded text-bluegrey/80 mb-3 text-lg sm:text-xl text-center">もんだいの しゅるい</p><button onClick={() => setUseDakuon(!useDakuon)} className={`w-full py-4 px-4 rounded-xl border-2 font-rounded font-bold text-lg transition-all flex flex-col items-center justify-center gap-1 ${useDakuon ? 'bg-sage border-sage text-white shadow-inner' : 'bg-white border-gray-300 text-gray-500 hover:bg-gray-50'}`}><span>だくおん・はんだくおん</span><span className="text-sm font-normal opacity-90">(が・ぱ など 点々や丸がつく文字)</span><span className="mt-1 text-base">{useDakuon ? 'ON (でる)' : 'OFF (でない)'}</span></button></div>
                <div className="mb-8"><p className="font-rounded text-bluegrey/80 mb-3 text-lg sm:text-xl text-center">ペンの ふとさ</p><div className="flex justify-center gap-4 sm:gap-6">{[{ size: 15, label: 'ほそい' }, { size: 25, label: 'ふつう' }, { size: 35, label: 'ふとい' }].map(p => (<button key={p.size} onClick={() => setPenSize(p.size)} className={`w-20 h-20 rounded-full flex flex-col items-center justify-center border-2 transition-all ${penSize === p.size ? 'bg-sage border-sage text-white shadow-inner scale-110' : 'bg-white border-gray-300 text-gray-400 hover:bg-gray-50'}`}><div className="bg-current rounded-full mb-1" style={{ width: p.size/3, height: p.size/3 }}></div><span className="font-rounded text-xs">{p.label}</span></button>))}</div></div>
                <div className="mb-8"><p className="font-rounded text-bluegrey/80 mb-3 text-lg sm:text-xl text-center">はんていの きびしさ</p><div className="flex justify-center gap-2 sm:gap-4">{[{ rate: 0.55, label: 'かんたん' }, { rate: 0.60, label: 'ふつう' }, { rate: 0.65, label: 'むずかしい' }].map(d => (<button key={d.rate} onClick={() => setDifficulty(d.rate)} className={`px-3 py-3 sm:px-4 sm:py-4 font-rounded text-sm sm:text-base rounded-xl transition-all ${difficulty === d.rate ? 'bg-sage text-white shadow-inner' : 'bg-white border border-gray-300 text-gray-500 hover:bg-gray-50'}`}>{d.label}</button>))}</div></div>
                <button onClick={() => setIsSettingsOpen(false)} className="w-full bg-terracotta text-white font-rounded py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-xl transition-all">とじる</button>
              </div>
            </div>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full h-full flex flex-col items-center justify-center p-4">
              <div className="bg-paper px-8 py-4 sm:py-6 rounded-sm shadow-md mb-8 transform -rotate-1 relative mt-12"><div className="masking-tape"></div><h1 className="font-rounded text-4xl sm:text-5xl font-bold text-bluegrey tracking-wider">モジノート</h1></div>
              <p className="font-rounded text-white bg-bluegrey/80 px-4 py-1 rounded-full mb-8 text-sm sm:text-base">どちら を れんしゅう する？</p>
              <div className="w-full max-w-sm flex flex-col gap-6">
                <button onClick={() => { setCharType('hiragana'); setGameState('MODE_SELECT'); }} className="w-full bg-paper aspect-[3/1] rounded-sm flex flex-col items-center justify-center relative shadow-md hover:-translate-y-1 hover:shadow-lg transition-all border border-gray-200"><div className="pin pin-blue"></div><span className="font-rounded text-3xl sm:text-4xl font-bold text-sage">ひらがな</span></button>
                <button onClick={() => { setCharType('katakana'); setGameState('MODE_SELECT'); }} className="w-full bg-paper aspect-[3/1] rounded-sm flex flex-col items-center justify-center relative shadow-md hover:-translate-y-1 hover:shadow-lg transition-all border border-gray-200 rotate-[1deg]"><div className="pin pin-yellow"></div><span className="font-rounded text-3xl sm:text-4xl font-bold text-terracotta">カタカナ</span></button>
              </div>
            </div>
          )}

          {gameState === 'MODE_SELECT' && (
            <div className="w-full h-full flex flex-col items-center justify-center p-4">
              <div className="bg-white px-6 py-3 rounded-full shadow-sm border border-gray-100 flex flex-col items-center mb-8 relative mt-12"><h2 className={`font-rounded text-2xl sm:text-3xl font-bold border-b-2 pb-1 ${charType === 'hiragana' ? 'text-sage border-sage' : 'text-terracotta border-terracotta'}`}>{charType === 'hiragana' ? 'ひらがな' : 'カタカナ'} の ノート</h2></div>
              <div className="w-full max-w-sm flex flex-col gap-6">
                <button onClick={() => startGame('char')} className="w-full bg-mustard text-white font-rounded py-5 rounded-xl shadow-md active:translate-y-1 active:shadow-sm flex flex-col items-center gap-1 transition-all border-4 border-white"><span className="text-2xl sm:text-3xl font-bold">1もじずつ</span><span className="text-sm sm:text-base">(10もん)</span></button>
                <button onClick={() => startGame('word')} className="w-full bg-bluegrey text-white font-rounded py-5 rounded-xl shadow-md active:translate-y-1 active:shadow-sm flex flex-col items-center gap-1 transition-all border-4 border-white"><span className="text-2xl sm:text-3xl font-bold">ことば で</span><span className="text-sm sm:text-base">(5もん)</span></button>
                <button onClick={() => setGameState('TITLE')} className="mt-4 font-rounded text-bluegrey/70 underline hover:text-bluegrey text-lg">← もどる</button>
              </div>
            </div>
          )}

          {gameState === 'PRACTICE' && questions.length > 0 && (
            <div className="w-full h-full flex flex-col p-2 sm:p-4 relative">
              <div className="w-full max-w-7xl mx-auto flex-1 flex flex-col items-center bg-paper rounded-sm shadow-xl text-gray-900 p-2 sm:p-4 overflow-hidden relative animate-open-note border border-white">
                <div className="w-full flex justify-between items-center font-rounded text-base sm:text-xl text-bluegrey/70 mb-1 px-2 shrink-0">
                  <button onClick={() => setGameState('MODE_SELECT')} className="underline hover:text-bluegrey" disabled={feedback !== null}>←やめる</button>
                  <div className="flex gap-4 font-bold"><span>{currentIndex + 1} / {questions.length}</span><span>スコア: {score}</span></div>
                </div>
                <div className={`font-rounded font-bold text-lg sm:text-2xl mb-1 px-6 py-1 rounded-full shrink-0 ${currentStep === 'trace' ? 'bg-sage/20 text-sage' : currentStep === 'blind' ? 'bg-bluegrey/10 text-bluegrey' : 'bg-terracotta/20 text-terracotta'}`}>
                  {currentStep === 'trace' && '① なぞって かこう！'}
                  {currentStep === 'blind' && '② おてほん なしで かこう！'}
                  {currentStep === 'retry_trace' && '★ あか文字 を なぞって かくにん！'}
                </div>
                {feedback && (
                  <div className="absolute inset-0 flex flex-col items-center justify-center pointer-events-none z-50 bg-white/40 backdrop-blur-sm">
                    <span className={`text-[9rem] sm:text-[12rem] drop-shadow-lg opacity-95 leading-none ${feedback === '⭕️' ? 'text-sage' : 'text-terracotta'}`}>{feedback}</span>
                    {errorMessage && <div className="mt-4 bg-white px-6 py-3 rounded-2xl border-4 border-terracotta text-terracotta font-rounded font-bold text-xl sm:text-2xl text-center whitespace-pre-wrap shadow-xl">{errorMessage}</div>}
                  </div>
                )}
                <div className="w-full flex-1 flex justify-center items-center gap-2 sm:gap-4 my-1 min-h-0">
                  {targetChars.map((char, idx) => {
                    let maxWidth = 'min(80vw, 55vh)'; 
                    if (playMode === 'word') { maxWidth = targetChars.length === 2 ? 'min(42vw, 55vh)' : 'min(28vw, 55vh)'; }
                    return (
                      <div key={idx} className="relative rounded-2xl aspect-square shadow-md overflow-hidden bg-white border-2 border-gray-200 shrink-0" style={{ width: '100%', maxWidth: maxWidth }}>
                        <canvas ref={el => bgCanvasRefs.current[idx] = el} width={CANVAS_SIZE} height={CANVAS_SIZE} className="absolute top-0 left-0 w-full h-full pointer-events-none" />
                        <canvas ref={el => drawCanvasRefs.current[idx] = el} width={CANVAS_SIZE} height={CANVAS_SIZE} onMouseDown={(e) => startDrawing(e, idx)} onMouseMove={(e) => draw(e, idx)} onMouseUp={(e) => stopDrawing(e, idx)} onMouseOut={(e) => stopDrawing(e, idx)} onTouchStart={(e) => startDrawing(e, idx)} onTouchMove={(e) => draw(e, idx)} onTouchEnd={(e) => stopDrawing(e, idx)} className="cursor-crosshair absolute top-0 left-0 w-full h-full touch-none" />
                      </div>
                    );
                  })}
                </div>
                <div className="flex gap-2 sm:gap-4 w-full justify-center shrink-0 pt-2 pb-1 px-2">
                  <button onClick={skipQuestion} disabled={feedback !== null} className="bg-bluegrey/80 text-white font-rounded py-3 px-4 sm:px-8 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-base sm:text-xl transition-all">とばす</button>
                  <button onClick={clearCanvas} disabled={feedback !== null} className="bg-gray-300 text-gray-700 font-rounded py-3 px-6 sm:px-10 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-base sm:text-xl transition-all">けす</button>
                  <button onClick={checkWriting} disabled={feedback !== null} className="bg-terracotta text-white font-rounded py-3 px-8 sm:px-14 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-lg sm:text-2xl font-bold transition-all">できた！</button>
                </div>
              </div>
            </div>
          )}

          {gameState === 'RESULT' && (
            <div className="w-full h-full flex flex-col p-4 sm:p-8 relative">
              <div className="w-full max-w-lg mx-auto flex-1 flex flex-col items-center justify-center bg-paper rounded-sm shadow-xl text-gray-900 p-6 overflow-hidden relative animate-open-note border border-white">
                <h2 className="font-rounded text-3xl sm:text-4xl font-bold mb-8 text-bluegrey border-b-2 border-sage pb-2">けっか はっぴょう</h2>
                <p className="text-[5rem] sm:text-[7rem] font-bold text-terracotta mb-4 leading-none drop-shadow-sm flex items-baseline gap-2">
                  {score} <span className="text-3xl sm:text-4xl text-bluegrey">/ {maxScore} てん</span>
                </p>
                <p className="font-rounded text-xl sm:text-2xl mb-12 text-sage font-bold">
                  {score === maxScore ? 'パーフェクト！すごいぞ！' : 'よくがんばったね！'}
                </p>
                <button onClick={() => setGameState('TITLE')} className="bg-bluegrey text-white font-rounded px-8 py-4 rounded-full shadow-md active:translate-y-1 active:shadow-sm text-xl w-full max-w-xs">
                  ノートをとじる
                </button>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
